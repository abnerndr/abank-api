services:
  db:
    image: postgres:14
    container_name: abank-db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: abank-api
    ports:
      - "${PORT:-8000}:8000"
    environment:
      NODE_ENV: development
      PORT: 8000
      DATABASE_URL: postgresql://root:123456@db:5432/postgres
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
